name: Enzyme differentiability
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  test:
    name: Julia v${{ matrix.version }}, ${{ matrix.os }}, ${{ matrix.arch }}
    # don't run if any of these labels are present
    if: >
      !( 
      contains(github.event.pull_request.labels.*.name, 'skip-ci') ||
      contains(github.event.pull_request.labels.*.name, 'skip-speedyweather-ci') ||
      contains(github.event.pull_request.labels.*.name, 'skip-enzyme-ci')
      )
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: ./SpeedyWeather
    timeout-minutes: 90
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      matrix:
        version:
          - '1.10'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Julia 1.10, add local packages as sources not supported yet
        shell: julia --color=yes --project=test/differentiability {0}
        run: |
          using Pkg
          Pkg.develop([PackageSpec(; path) for path in ("../SpeedyWeatherInternals", "../LowerTriangularArrays", "../RingGrids", "../SpeedyTransforms", ".")])
          Pkg.instantiate()
        if: ${{ matrix.version == '1.10' }}
      - name: Run Enzyme differentiability tests
        run: |
          julia --color=yes --project=test/differentiability test/differentiability/full_diff_CI.jl
        env:
          GITHUB_AUTH: ${{ secrets.GITHUB_TOKEN }}
