# TEMPORARY debug workflow — localizes the Julia 1.12 Enzyme codegen assertion
# ("unhandled accumulate with partial sizes") in full_diff_CI.jl on x86.
#
# On ARM/Apple-Silicon this bug HANGS (release Enzyme_jll, no assertion); only x86
# with the assertions-enabled Enzyme_jll aborts fast (exit 134) and is debuggable.
# Each variant runs in its own Julia process with continue-on-error so one abort
# does not stop the others — we read the full bisection from a single CI run.
#
# DELETE this file once the second (parameter-AD) trigger is localized/fixed.
name: Enzyme 1.12 x86 debug
on:
  push:
    branches:
      - mg/enzyme-1-12-ci-x86
  workflow_dispatch:
jobs:
  debug:
    name: Julia 1.12 x86 Enzyme localization
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    timeout-minutes: 45
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
          arch: x64
      - uses: julia-actions/cache@v3
      - name: Develop local packages
        run: |
          julia --color=yes --project=SpeedyWeather/test/differentiability -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="SpeedyWeatherInternals"),
              PackageSpec(path="LowerTriangularArrays"),
              PackageSpec(path="RingGrids"),
              PackageSpec(path="SpeedyTransforms"),
              PackageSpec(path="SpeedyWeather")
            ])
            Pkg.instantiate()
          '
      - name: "Variant 1 — state AD (Const model) [expect PASS: make_zero fix]"
        id: v1
        continue-on-error: true
        run: |
          julia --color=yes --project=SpeedyWeather/test/differentiability SpeedyWeather/test/differentiability/_ts_const_model.jl
        env:
          GITHUB_AUTH: ${{ secrets.GITHUB_TOKEN }}
      - name: "Variant 2 — dynamics_only, Duplicated(model) [isolate physics vs dyn-core]"
        id: v2
        continue-on-error: true
        run: |
          julia --color=yes --project=SpeedyWeather/test/differentiability SpeedyWeather/test/differentiability/_ts_dynonly.jl
        env:
          GITHUB_AUTH: ${{ secrets.GITHUB_TOKEN }}
      - name: "Variant 3 — full full_diff_CI.jl, Duplicated(model) [expect ABORT exit 134]"
        id: v3
        continue-on-error: true
        run: |
          julia --color=yes --project=SpeedyWeather/test/differentiability SpeedyWeather/test/differentiability/full_diff_CI.jl
        env:
          GITHUB_AUTH: ${{ secrets.GITHUB_TOKEN }}
      - name: Summary
        if: always()
        run: |
          {
            echo "## Enzyme 1.12 x86 localization results"
            echo ""
            echo "| Variant | AD kind | Outcome |"
            echo "|---------|---------|---------|"
            echo "| 1 state AD (Const model) | Const(model) | ${{ steps.v1.outcome }} |"
            echo "| 2 dynamics_only | Duplicated(model) | ${{ steps.v2.outcome }} |"
            echo "| 3 full_diff_CI | Duplicated(model) | ${{ steps.v3.outcome }} |"
            echo ""
            echo "'success' = compiled + autodiff returned; 'failure' = aborted/errored (see step log)."
          } >> "$GITHUB_STEP_SUMMARY"
